name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore backend/Tailbook.slnx

      - run: dotnet build backend/Tailbook.slnx --no-restore --configuration Release

      - name: Run tests with coverage
        run: dotnet test backend/Tailbook.slnx --no-build --configuration Release --collect:"XPlat Code Coverage"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.4
        with:
          reports: backend/tests/**/TestResults/**/coverage.cobertura.xml
          targetdir: coverage-report
          reporttypes: Html;MarkdownSummaryGithub

      - name: Add coverage to job summary
        run: cat coverage-report/*SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: coverage-report
          if-no-files-found: warn

  frontend:
    name: Frontend (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm test -- --coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-reports
          path: apps/*/coverage/
          if-no-files-found: warn
