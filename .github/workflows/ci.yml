name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-prepare:
    name: Build (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - run: dotnet restore backend/Tailbook.slnx

      - run: dotnet build backend/Tailbook.slnx --no-restore --configuration Release

      - name: Check NuGet vulnerabilities
        run: dotnet list backend/Tailbook.slnx package --vulnerable

  backend-test:
    name: ${{ matrix.project }}
    needs: backend-prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - Tailbook.Api.Tests
          - Tailbook.Architecture.Tests
          - Tailbook.Modules.Booking.Tests
          - Tailbook.Modules.Catalog.Tests
          - Tailbook.Modules.Customer.Tests
          - Tailbook.Modules.Identity.Tests
          - Tailbook.Modules.Notifications.Tests
          - Tailbook.Modules.Pets.Tests
          - Tailbook.Modules.Reporting.Tests
          - Tailbook.Modules.Staff.Tests
          - Tailbook.Modules.Audit.Tests
          - Tailbook.Modules.VisitOperations.Tests
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        run: dotnet test backend/tests/${{ matrix.project }}/${{ matrix.project }}.csproj --configuration Release --collect:"XPlat Code Coverage" --results-directory backend/tests/${{ matrix.project }}/TestResults

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: backend/tests/${{ matrix.project }}/TestResults
          flags: backend
          fail_ci_if_error: false

      - uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.project }}
          path: backend/tests/${{ matrix.project }}/TestResults
          if-no-files-found: warn

  backend-coverage:
    name: Coverage
    if: always()
    needs: [backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: coverage-*
          merge-multiple: true

      - uses: danielpalme/ReportGenerator-GitHub-Action@5.4.4
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: coverage-report
          reporttypes: Html;MarkdownSummaryGithub

      - name: Add coverage to job summary
        run: cat coverage-report/*SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v6
        with:
          name: backend-coverage-report
          path: coverage-report
          if-no-files-found: warn

  frontend:
    name: Frontend (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm test -- --coverage

      - name: Audit npm dependencies
        run: pnpm audit --audit-level=high

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/admin-web/coverage/lcov.info,apps/client-web/coverage/lcov.info,apps/groomer-web/coverage/lcov.info,packages/frontend-api/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage-reports
          path: apps/*/coverage/
          if-no-files-found: warn

  infra-caddy:
    name: Caddy (config validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/ops/caddy/Caddyfile:/Caddyfile:ro \
            caddy:2-alpine \
            caddy validate --config /Caddyfile --adapter caddyfile

      - name: Validate Dockerfile builds
        run: |
          docker build --pull \
            -f ops/caddy/Dockerfile.caddy \
            -t tailbook-caddy-test \
            .

  security-owasp:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: Tailbook
          path: .
          format: HTML
          args: >
            --failOnCVSS 7
            --suppression .github/owasp-suppressions.xml
            --enableExperimental

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v6
        with:
          name: owasp-dependency-check-report
          path: reports/
          if-no-files-found: warn

  security-sast:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [csharp, javascript-typescript]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - if: matrix.language == 'csharp'
        uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3

  security-container:
    name: Trivy
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            tag: tailbook-api:ci
            dockerfile: backend/src/Tailbook.Api.Host/Dockerfile
          - name: admin-web
            tag: tailbook-admin-web:ci
            dockerfile: apps/admin-web/Dockerfile
          - name: client-web
            tag: tailbook-client-web:ci
            dockerfile: apps/client-web/Dockerfile
          - name: groomer-web
            tag: tailbook-groomer-web:ci
            dockerfile: apps/groomer-web/Dockerfile
          - name: caddy
            tag: tailbook-caddy:ci
            dockerfile: ops/caddy/Dockerfile.caddy
    steps:
      - uses: actions/checkout@v6

      - name: Build ${{ matrix.image.name }} image
        run: docker build --pull -t ${{ matrix.image.tag }} -f ${{ matrix.image.dockerfile }} .

      - name: Run Trivy on ${{ matrix.image.name }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ matrix.image.tag }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Upload Trivy report
        uses: actions/upload-artifact@v6
        with:
          name: trivy-report-${{ matrix.image.name }}
          path: trivy-${{ matrix.image.name }}.sarif
          if-no-files-found: warn

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}
