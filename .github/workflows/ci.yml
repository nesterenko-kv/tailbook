name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-prepare:
    name: Build (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - run: dotnet restore backend/Tailbook.slnx

      - run: dotnet build backend/Tailbook.slnx --no-restore --configuration Release

      - uses: actions/upload-artifact@v6
        with:
          name: backend-build
          path: backend/tests/*/bin/Release/net10.0/**
          compression-level: 6

  backend-test:
    name: ${{ matrix.project }}
    needs: backend-prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - Tailbook.Api.Tests
          - Tailbook.Architecture.Tests
          - Tailbook.Modules.Booking.Tests
          - Tailbook.Modules.Catalog.Tests
          - Tailbook.Modules.Customer.Tests
          - Tailbook.Modules.Identity.Tests
          - Tailbook.Modules.Notifications.Tests
          - Tailbook.Modules.Pets.Tests
          - Tailbook.Modules.Reporting.Tests
          - Tailbook.Modules.Staff.Tests
          - Tailbook.Modules.Audit.Tests
          - Tailbook.Modules.VisitOperations.Tests
          - Tailbook.Tests.Infrastructure
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: actions/download-artifact@v6
        with:
          name: backend-build
          path: .

      - name: Run tests
        run: dotnet test backend/tests/${{ matrix.project }}/${{ matrix.project }}.csproj --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory backend/tests/${{ matrix.project }}/TestResults

      - uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.project }}
          path: backend/tests/${{ matrix.project }}/TestResults
          if-no-files-found: warn

  backend-coverage:
    name: Coverage
    if: always()
    needs: [backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: coverage-*
          merge-multiple: true

      - uses: codecov/codecov-action@v5
        with:
          directory: .
          flags: backend
          fail_ci_if_error: false

      - uses: danielpalme/ReportGenerator-GitHub-Action@5.4.4
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: coverage-report
          reporttypes: Html;MarkdownSummaryGithub

      - name: Add coverage to job summary
        run: cat coverage-report/*SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v6
        with:
          name: backend-coverage-report
          path: coverage-report
          if-no-files-found: warn

  frontend:
    name: Frontend (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/admin-web/coverage/lcov.info,apps/client-web/coverage/lcov.info,apps/groomer-web/coverage/lcov.info,packages/frontend-api/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage-reports
          path: apps/*/coverage/
          if-no-files-found: warn
